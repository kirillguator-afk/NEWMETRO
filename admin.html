
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>METRO ADMIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">
    <h1 class="text-2xl font-black text-emerald-500 mb-10 tracking-tighter">METRO_OPS</h1>
    <div id="admin-content" class="hidden">
        <div id="list" class="space-y-4">Fetching secure data...</div>
    </div>
    <div id="access-denied" class="hidden text-center py-20">
        <h2 class="text-xl font-bold text-red-500">ACCESS DENIED</h2>
    </div>

    <script type="module">
        import { MetroAPI } from './api.js';
        const tg = window.Telegram.WebApp;

        async function init() {
            tg.ready();
            const res = await MetroAPI.getAdminPayments();
            if (res?.error) {
                document.getElementById('access-denied').classList.remove('hidden');
                return;
            }
            document.getElementById('admin-content').classList.remove('hidden');
            render(res);
        }

        function render(reqs) {
            const listEl = document.getElementById('list');
            listEl.innerHTML = '';
            
            if (!reqs.length) {
                listEl.textContent = "No requests found.";
                return;
            }

            reqs.forEach(r => {
                const card = document.createElement('div');
                card.className = 'p-6 bg-slate-900 border border-white/5 rounded-2xl';
                
                // [SECURITY] Используем textContent для предотвращения XSS
                const header = document.createElement('div');
                header.className = 'flex justify-between';
                header.innerHTML = `<span class="text-[10px] font-black ${r.payType==='DEPOSIT'?'text-emerald-400':'text-orange-400'}">${r.payType}</span>`;
                
                const amt = document.createElement('span');
                amt.className = 'font-bold text-lg';
                amt.textContent = `${parseInt(r.amount)} CASH`;
                header.appendChild(amt);

                const info = document.createElement('div');
                info.className = 'text-[10px] text-slate-500 mt-3 font-mono';
                
                const userLine = document.createElement('div');
                userLine.textContent = `USER: ${r.user} (${r.id})`;
                
                const dataLine = document.createElement('div');
                dataLine.textContent = `INFO: ${r.info}`;

                info.appendChild(userLine);
                info.appendChild(dataLine);
                card.appendChild(header);
                card.appendChild(info);
                listEl.appendChild(card);
            });
        }
        init();
    </script>
</body>
</html>
