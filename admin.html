
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METRO ADMIN PANEL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .req-card { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-emerald-400">METRO ADMIN</h1>
        <button onclick="location.reload()" class="bg-slate-800 px-3 py-1 rounded text-xs">REFRESH</button>
    </header>

    <div id="admin-content" class="hidden">
        <div class="mb-4">
            <h2 class="text-xs uppercase text-slate-500 font-bold tracking-widest">Pending Requests</h2>
        </div>
        <div id="request-list" class="space-y-3">
            <div class="text-center py-10 opacity-50">Loading transactions...</div>
        </div>
    </div>

    <div id="access-denied" class="hidden flex flex-col items-center justify-center h-64 text-center">
        <span class="text-4xl mb-4">🚫</span>
        <h2 class="text-red-500 font-bold">Access Denied</h2>
        <p class="text-xs text-slate-500 mt-2">Only the owner can access this panel.</p>
    </div>

    <script type="module">
        import { MetroAPI, OWNER_ID, CHANNEL_ID } from './api.js';

        const tg = window.Telegram.WebApp;

        const Admin = {
            async init() {
                const user = tg.initDataUnsafe?.user;
                if(!user || user.id !== OWNER_ID) {
                    document.getElementById('access-denied').classList.remove('hidden');
                    return;
                }

                document.getElementById('admin-content').classList.remove('hidden');
                this.loadRequests();
            },

            async loadRequests() {
                const listEl = document.getElementById('request-list');
                const updates = await MetroAPI.getUpdates();
                
                const requests = [];
                updates.forEach(u => {
                    const text = (u.channel_post || u.message)?.text || "";
                    if(text.startsWith('#PAY_REQ')) {
                        const parts = text.split('|');
                        const data = {};
                        parts.forEach(p => {
                            const [k, v] = p.split(':');
                            if(k && v) data[k.replace('#PAY_REQ|', '')] = v;
                        });
                        requests.push(data);
                    }
                });

                if(requests.length === 0) {
                    listEl.innerHTML = '<div class="text-center py-10 text-slate-600">Queue is empty</div>';
                    return;
                }

                listEl.innerHTML = requests.reverse().map(r => `
                    <div class="req-card">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold ${r.TYPE === 'DEPOSIT' ? 'text-emerald-400' : 'text-orange-400'}">${r.TYPE}</span>
                            <span class="font-mono text-white">${r.AMT} CASH</span>
                        </div>
                        <div class="text-xs text-slate-400">
                            User: ${r.USER} (ID: ${r.ID})<br>
                            Info: ${r.INFO}
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="alert('Confirmed for ${r.ID}')" class="flex-1 bg-emerald-600 py-2 rounded font-bold text-xs">APPROVE</button>
                            <button class="flex-1 bg-red-900/40 py-2 rounded font-bold text-xs">REJECT</button>
                        </div>
                    </div>
                `).join('');
            }
        };

        window.addEventListener('load', () => Admin.init());
    </script>
</body>
</html>
