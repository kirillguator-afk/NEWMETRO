



    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020617; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-ui { width: 55px; height: 80px; background: white; border-radius: 8px; color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; position: relative; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card-red { color: #ef4444; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .pulse-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>



    <input type="file" id="avatar-input" class="hidden" accept="image/png,image/jpeg,image/webp">

    <div id="net-overlay" class="modal hidden flex-col">
        <div class="w-8 h-8 border-2 border-emerald-500 border-t-transparent animate-spin rounded-full"></div>
        <p class="mt-4 text-emerald-400 font-bold text-[10px] tracking-widest uppercase">Syncing Security Matrix</p>
    </div>

    <div id="view-home" class="view flex-1 flex flex-col p-5 overflow-y-auto">
        <div class="flex items-center gap-4 mb-6 glass p-4 rounded-2xl">
            <div class="relative cursor-pointer" id="avatar-trigger">
                <div id="ui-avatar" class="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-xl font-bold overflow-hidden border-2 border-emerald-500/30">?</div>
            </div>
            <div class="flex-1">
                <h2 id="ui-name" class="text-white font-bold">Guest</h2>
                <div class="text-emerald-400 font-bold tracking-tight"><span id="ui-balance">1000</span> CASH</div>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="tab-btn-games" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-[10px] uppercase tracking-wider">Games</button>
            <button id="tab-btn-servers" class="flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-[10px] uppercase tracking-wider">Servers</button>
        </div>

        <div id="pane-games" class="space-y-3">
            <div id="btn-create-bj" class="p-6 glass rounded-2xl border-l-4 border-emerald-500 active:scale-[0.98] transition-all cursor-pointer">
                <h3 class="font-bold text-lg">BLACKJACK</h3>
                <p class="text-[9px] text-slate-500 uppercase tracking-widest">Authorized Table • Low Latency</p>
            </div>
        </div>

        <div id="pane-servers" class="hidden flex-1 flex flex-col">
            <div id="server-list" class="space-y-3 pb-20"></div>
        </div>
    </div>

    <div id="view-game" class="view hidden fixed inset-0 z-50 bg-[#020617] flex flex-col">
        <div class="p-4 flex justify-between bg-black/40 text-[10px] border-b border-white/5">
            <span class="opacity-50">NODE_SESSION_SECURE</span>
            <span id="game-status-label" class="text-emerald-400 font-bold">STABLE CONNECTION</span>
        </div>
        
        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div id="dealer-cards" class="flex gap-2"></div>
            <div id="dealer-score" class="mt-4 px-3 py-1 bg-white/5 rounded-full text-slate-400 text-[10px] font-bold">DEALER: ?</div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative border-t border-white/5">
            <div id="player-cards" class="flex gap-2"></div>
            <div id="player-score" class="mt-4 px-3 py-1 bg-emerald-500/10 rounded-full text-emerald-400 text-[10px] font-bold tracking-widest uppercase">YOU: 0</div>
            
            <div id="game-actions" class="hidden absolute bottom-10 flex gap-4 w-full px-10">
                <button id="btn-hit" class="flex-1 py-4 bg-emerald-600 text-white font-black rounded-xl shadow-lg active:scale-95 transition-transform text-xs">HIT</button>
                <button id="btn-stand" class="flex-1 py-4 bg-slate-800 text-white font-black rounded-xl shadow-lg active:scale-95 transition-transform text-xs">STAND</button>
            </div>
        </div>

        <div id="result-overlay" class="hidden modal z-[60] flex-col text-center">
            <div class="glass p-10 rounded-3xl border border-white/10 w-full max-w-xs">
                <h1 id="result-msg" class="text-5xl font-black mb-8 italic tracking-tighter"></h1>
                <button onclick="location.reload()" class="w-full py-4 bg-white text-black font-black rounded-xl uppercase text-xs tracking-widest">Return to Base</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { MetroAPI } from './api.js';
        import { MetroNetwork } from './network.js';

        const tg = window.Telegram.WebApp;
        
        const App = {
            state: {
                user: { id: 0, name: 'Guest', avatarUrl: null },
                role: null, 
                game: null,
                lobbyId: null,
                net: null,
                activeTab: 'games'
            },

            async init() {
                tg.ready();
                tg.expand();
                const u = tg.initDataUnsafe?.user;
                if(u) {
                    this.state.user.id = u.id;
                    this.state.user.name = u.first_name;
                    document.getElementById('ui-name').textContent = u.first_name;
                    const prof = await MetroAPI.getUserProfile();
                    if(prof?.avatarUrl) this.updateAvatarUI(prof.avatarUrl);
                }
                
                this.state.net = new MetroNetwork(this.state.user.id, (d) => this.onNetMsg(d), () => this.onPeerReady());
                
                document.getElementById('avatar-trigger').onclick = () => document.getElementById('avatar-input').click();
                document.getElementById('avatar-input').onchange = (e) => this.handleAvatarUpload(e);
                document.getElementById('tab-btn-games').onclick = () => this.setTab('games');
                document.getElementById('tab-btn-servers').onclick = () => this.setTab('servers');
                document.getElementById('btn-create-bj').onclick = () => this.openCreateLobby();
                document.getElementById('btn-hit').onclick = () => this.gameAction('HIT');
                document.getElementById('btn-stand').onclick = () => this.gameAction('STAND');

                setInterval(() => { if(this.state.activeTab === 'servers') this.refreshLobbies(); }, 10000);
            },

            async handleAvatarUpload(e) {
                const f = e.target.files[0];
                if(!f) return;
                const res = await MetroAPI.uploadAvatar(f);
                if(res?.url) this.updateAvatarUI(res.url);
            },

            updateAvatarUI(url) {
                this.state.user.avatarUrl = url;
                const container = document.getElementById('ui-avatar');
                container.innerHTML = '';
                const img = document.createElement('img');
                img.src = url;
                img.className = 'w-full h-full object-cover';
                container.appendChild(img);
            },

            setTab(t) {
                this.state.activeTab = t;
                document.getElementById('pane-games').classList.toggle('hidden', t !== 'games');
                document.getElementById('pane-servers').classList.toggle('hidden', t !== 'servers');
                const btnG = document.getElementById('tab-btn-games');
                const btnS = document.getElementById('tab-btn-servers');
                btnG.className = t === 'games' ? 'flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-[10px] uppercase' : 'flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-[10px] uppercase';
                btnS.className = t === 'servers' ? 'flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-[10px] uppercase' : 'flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-[10px] uppercase';
                if(t === 'servers') this.refreshLobbies();
            },

            async refreshLobbies() {
                const listEl = document.getElementById('server-list');
                const labs = await MetroAPI.getLobbies();
                listEl.innerHTML = '';
                
                labs.forEach(i => {
                    const row = document.createElement('div');
                    row.className = 'glass p-5 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all';
                    row.onclick = () => this.joinTable(i.id);
                    
                    const left = document.createElement('div');
                    left.className = 'flex items-center gap-4';
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'w-10 h-10 rounded-full bg-slate-800 overflow-hidden border border-white/10 flex items-center justify-center';
                    if(i.avatar) {
                        const img = document.createElement('img');
                        img.src = i.avatar;
                        img.className = 'w-full h-full object-cover';
                        avatar.appendChild(img);
                    } else {
                        avatar.textContent = i.user[0];
                    }

                    const info = document.createElement('div');
                    const name = document.createElement('div');
                    name.className = 'font-bold text-white tracking-tight';
                    name.textContent = i.user;
                    info.appendChild(name);
                    
                    const bet = document.createElement('div');
                    bet.className = 'text-emerald-400 font-black text-lg';
                    bet.textContent = i.bet;

                    left.appendChild(avatar);
                    left.appendChild(info);
                    row.appendChild(left);
                    row.appendChild(bet);
                    listEl.appendChild(row);
                });
            },

            async openCreateLobby() {
                const b = prompt("BET AMOUNT:", "100");
                if(!b) return;
                this.state.role = 'host';
                this.state.lobbyId = this.state.net.peerId;
                const game = await MetroAPI.startGame(this.state.lobbyId, b);
                this.state.game = game;
                this.showView('game');
                this.render();
                await MetroAPI.publishLobby(this.state.user.id, this.state.user.name, b, this.state.user.avatarUrl, this.state.net.peerId);
            },

            async joinTable(id) {
                this.state.role = 'client';
                this.state.lobbyId = id;
                document.getElementById('net-overlay').classList.remove('hidden');
                this.state.net.connectTo(id);
            },

            onPeerReady() {
                document.getElementById('net-overlay').classList.add('hidden');
                if(this.state.role === 'client') {
                    this.showView('game');
                    this.syncState();
                }
            },

            async syncState() {
                const res = await MetroAPI.performAction(this.state.lobbyId, 'SYNC_REQUEST');
                if(res && !res.error) {
                    this.state.game = res;
                    this.render();
                }
            },

            async gameAction(act) {
                const currentTurn = this.state.game?.turnCount || 1;
                const newState = await MetroAPI.performAction(this.state.lobbyId, act, currentTurn);
                
                if(newState.error) {
                    tg.showAlert(newState.error);
                    if(newState.error.includes('Syncing')) this.syncState();
                    return;
                }
                this.state.game = newState;
                this.state.net.send('UPDATE_SIGNAL');
                this.render();
            },

            onNetMsg(msg) {
                if(msg.type === 'UPDATE_SIGNAL') {
                    this.syncState();
                }
            },

            render() {
                const g = this.state.game;
                if(!g) return;

                const isEnd = g.status === 'END';
                const showFullDealer = isEnd || g.status === 'DEALER_TURN';

                document.getElementById('player-cards').innerHTML = g.playerHand.map(c => this.cardTpl(c)).join('');
                document.getElementById('dealer-cards').innerHTML = g.dealerHand.map((c, i) => 
                    (i === 0 && !showFullDealer) ? `<div class="card-ui bg-slate-900 border border-white/5"><div class="w-full h-full opacity-10 bg-gradient-to-br from-white to-transparent rounded-lg"></div></div>` : this.cardTpl(c)
                ).join('');

                // [DRY FIX] Используем очки с сервера
                document.getElementById('player-score').textContent = `YOU: ${g.playerScore}`;
                document.getElementById('dealer-score').textContent = `DEALER: ${g.dealerScore}`;
                
                document.getElementById('game-actions').classList.toggle('hidden', g.status !== 'PLAYER_TURN');
                
                if(isEnd) {
                    setTimeout(() => this.showResult(), 800);
                }
            },

            cardTpl(c) {
                const isRed = ['♥', '♦'].includes(c.suit);
                return `<div class="card-ui ${isRed?'card-red':''}">
                    <span class="text-[9px] absolute top-1 left-1.5 font-black">${c.value}</span>
                    <span class="text-2xl my-auto">${c.suit}</span>
                </div>`;
            },

            showResult() {
                const g = this.state.game;
                const p = g.playerScore;
                const d = typeof g.dealerScore === 'number' ? g.dealerScore : 0;
                
                let res = (p > 21) ? "BUSTED" : (d > 21 || p > d) ? "WINNER" : (p === d) ? "PUSH" : "LOSE";
                const msg = document.getElementById('result-msg');
                msg.textContent = res;
                msg.className = `text-5xl font-black mb-8 italic tracking-tighter ${res === 'WINNER' ? 'text-emerald-500' : 'text-red-500'}`;
                document.getElementById('result-overlay').classList.remove('hidden');
            },

            showView(v) {
                document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
                document.getElementById(`view-${v}`).classList.remove('hidden');
            }
        };

        window.onload = () => App.init();
    </script>
