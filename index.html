
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        :root { --accent: #10b981; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; overflow: hidden; height: 100vh; margin: 0; }
        .font-cyber { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-item { transition: all 0.3s; opacity: 0.4; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: translateY(-2px); }
        .card-ui { width: 42px; height: 60px; background: #fff; border-radius: 6px; color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-red { color: #ef4444; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .view-content { height: calc(100vh - 150px); overflow-y: auto; padding: 20px; }
        #view-game { position: fixed; inset: 0; z-index: 500; background: #020617; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(100%); pointer-events: none; }
        #view-game.active { transform: translateY(0); pointer-events: all; }
    </style>
</head>
<body class="flex flex-col">

    <div id="boot-overlay" class="modal flex flex-col">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent animate-spin rounded-full mb-6"></div>
        <div class="font-cyber text-[10px] tracking-widest text-emerald-400 animate-pulse">INITIALIZING METRO NODE...</div>
    </div>

    <div class="p-5 flex justify-between items-center z-10">
        <div class="font-cyber text-sm font-bold tracking-tighter">METRO<span class="text-emerald-500">CASH</span></div>
        <div class="glass px-4 py-1.5 rounded-full flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
            <span id="top-balance" class="font-bold text-xs">0</span>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="view-home" class="view-content">
            <div class="p-8 glass rounded-3xl text-center space-y-4 border-l-4 border-emerald-500">
                <h1 class="font-cyber text-lg">SYSTEM ACCESS</h1>
                <button id="btn-create-bj" class="w-full py-4 bg-emerald-600 text-white font-cyber text-[10px] rounded-xl">HOST NEW NODE</button>
            </div>
        </div>

        <div id="view-servers" class="view-content hidden">
            <div id="server-list" class="space-y-4"></div>
        </div>

        <div id="view-rank" class="view-content hidden">
            <div id="leaderboard-list" class="space-y-2"></div>
        </div>

        <div id="view-profile" class="view-content hidden">
            <div class="flex flex-col items-center gap-4 mb-8">
                <div id="profile-avatar" class="w-20 h-20 rounded-full bg-slate-800 flex items-center justify-center font-black text-2xl">?</div>
                <div id="profile-name" class="font-cyber text-sm text-center">Runner</div>
            </div>
            <button class="w-full py-4 glass rounded-xl font-cyber text-[9px] text-emerald-500">DEPOSIT</button>
        </div>

        <div id="view-game" class="flex flex-col">
            <div class="p-4 border-b border-white/5 flex justify-between items-center glass">
                <div id="game-status" class="text-[8px] font-cyber text-emerald-400">SYNCED</div>
                <button onclick="location.reload()" class="text-[8px] font-cyber text-rose-500">EXIT</button>
            </div>
            <div class="flex-1 flex flex-col justify-around p-4">
                <div class="flex flex-col items-center">
                    <div id="dealer-hand" class="flex gap-1"></div>
                    <div id="dealer-score" class="mt-2 text-[10px] font-bold text-slate-500">DEALER: ?</div>
                </div>
                <div class="grid grid-cols-2 gap-4 h-56">
                    <div id="host-zone" class="glass rounded-2xl p-4 flex flex-col items-center justify-between">
                        <div id="host-hand" class="flex flex-wrap justify-center gap-1"></div>
                        <div id="host-score" class="font-bold text-xs text-emerald-400">0</div>
                    </div>
                    <div id="guest-zone" class="glass rounded-2xl p-4 flex flex-col items-center justify-between">
                        <div id="guest-hand" class="flex flex-wrap justify-center gap-1"></div>
                        <div id="guest-score" class="font-bold text-xs text-emerald-400">0</div>
                    </div>
                </div>
                <div id="game-actions" class="flex gap-4">
                    <button id="btn-hit" class="flex-1 py-5 bg-emerald-600 rounded-xl font-cyber text-[10px]">HIT</button>
                    <button id="btn-stand" class="flex-1 py-5 bg-slate-800 rounded-xl font-cyber text-[10px]">STAND</button>
                </div>
            </div>
            <div id="result-overlay" class="hidden absolute inset-0 glass z-[600] flex flex-col items-center justify-center p-10 text-center">
                <div id="result-title" class="font-cyber text-4xl mb-8 italic"></div>
                <button onclick="location.reload()" class="w-full py-4 bg-white text-black font-cyber text-[10px] rounded-xl font-bold">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="main-nav" class="glass border-t border-white/5 p-4 pb-10 flex justify-around items-center shrink-0">
        <div onclick="App.navigate('home')" id="nav-home" class="nav-item active"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2"/></svg></div>
        <div onclick="App.navigate('servers')" id="nav-servers" class="nav-item"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2" stroke-width="2"/></svg></div>
        <div onclick="App.navigate('rank')" id="nav-rank" class="nav-item"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-width="2"/></svg></div>
        <div onclick="App.navigate('profile')" id="nav-profile" class="nav-item"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg></div>
    </div>

    <script type="module">
        import { MetroAPI } from './api.js';
        import { MetroNetwork } from './network.js';
        const tg = window.Telegram.WebApp;

        const App = {
            state: { user: null, game: null, lobbyId: null, isProcessing: false },
            esc(s) { if(!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; },

            async init() {
                tg.ready(); tg.expand();
                tg.headerColor = '#020617';
                
                // Проверка на запуск вне Telegram
                if(!tg.initData) {
                    document.getElementById('boot-overlay').innerHTML = `<div class="text-center p-10 font-cyber text-rose-500">NODE ACCESS DENIED<br><span class="text-[10px] text-white opacity-50">PLEASE OPEN VIA TELEGRAM BOT</span></div>`;
                    return;
                }

                try {
                    const data = await MetroAPI.getProfile();
                    if(!data) throw new Error("AUTH_FAIL");
                    
                    this.state.user = data;
                    this.updateUIProfile(data);
                    
                    this.state.net = new MetroNetwork(
                        this.state.user.id, 
                        (d) => this.onNetMsg(d), 
                        () => this.onPeerReady()
                    );
                    
                    document.getElementById('boot-overlay').classList.add('hidden');
                    this.setupListeners();
                } catch (e) {
                    tg.showAlert("Matrix Sync Failed: " + e.message);
                }
            },

            updateUIProfile(data) {
                document.getElementById('top-balance').textContent = data.balance.toLocaleString();
                document.getElementById('profile-name').textContent = data.name;
                if(data.avatarUrl) {
                    const box = document.getElementById('profile-avatar');
                    box.innerHTML = `<img src="${data.avatarUrl}" class="w-full h-full object-cover">`;
                }
            },

            setupListeners() {
                document.getElementById('btn-create-bj').onclick = () => this.openCreateLobby();
                document.getElementById('btn-hit').onclick = () => this.gameAction('HIT');
                document.getElementById('btn-stand').onclick = () => this.gameAction('STAND');
                window.App = this;
            },

            navigate(tab) {
                if(document.getElementById('view-game').classList.contains('active')) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
                document.getElementById(`view-${tab}`).classList.remove('hidden');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(`nav-${tab}`).classList.add('active');
                if (tab === 'servers') this.refreshLobbies();
                if (tab === 'rank') this.loadLeaderboard();
            },

            async refreshLobbies() {
                const labs = await MetroAPI.getLobbies();
                const frag = document.createDocumentFragment();
                labs.forEach(l => {
                    const row = document.createElement('div');
                    row.className = 'glass p-6 rounded-3xl flex justify-between items-center active:scale-95 transition-all';
                    row.innerHTML = `<div><div class="font-bold text-sm">${this.esc(l.user)}</div><div class="text-[8px] text-slate-500">UPLINK READY</div></div><div class="text-emerald-500 font-black">${l.bet} C</div>`;
                    row.onclick = () => this.joinTable(l.id);
                    frag.appendChild(row);
                });
                document.getElementById('server-list').replaceChildren(frag);
            },

            async loadLeaderboard() {
                const users = await MetroAPI.getLeaderboard();
                const frag = document.createDocumentFragment();
                users.forEach((u, i) => {
                    const row = document.createElement('div');
                    row.className = 'glass p-4 rounded-xl flex justify-between items-center';
                    row.innerHTML = `<div class="flex items-center gap-3"><span class="text-[8px] opacity-30">#${i+1}</span><span class="font-bold text-xs">${this.esc(u.name)}</span></div><div class="text-emerald-400 font-black text-xs">${u.wins} WINS</div>`;
                    frag.appendChild(row);
                });
                document.getElementById('leaderboard-list').replaceChildren(frag);
            },

            async openCreateLobby() {
                const b = prompt("Stake Amount (min 10):", "100"); 
                if(!b || parseInt(b) < 10) return;
                this.state.lobbyId = this.state.net.peerId;
                const game = await MetroAPI.startGame(this.state.lobbyId, b);
                if (game.error) return tg.showAlert(game.error);
                this.state.game = game;
                this.toggleGameView(true);
                this.render();
                await MetroAPI.publishLobby(b, this.state.net.peerId);
            },

            async joinTable(id) {
                this.state.lobbyId = id;
                document.getElementById('boot-overlay').classList.remove('hidden');
                this.state.net.connectTo(id);
            },

            async onPeerReady() {
                document.getElementById('boot-overlay').classList.add('hidden');
                if (this.state.lobbyId && !this.state.game) {
                    const game = await MetroAPI.joinGame(this.state.lobbyId);
                    if (game.error) return tg.showAlert(game.error);
                    this.state.game = game;
                    this.state.net.send('UPDATE_SIGNAL');
                    this.toggleGameView(true);
                    this.render();
                }
            },

            toggleGameView(active) {
                const view = document.getElementById('view-game');
                if(active) view.classList.add('active');
                else view.classList.remove('active');
            },

            onNetMsg(m) { if(m.type === 'UPDATE_SIGNAL') this.sync(); },
            async sync() {
                const r = await MetroAPI.performAction(this.state.lobbyId, 'SYNC_REQUEST');
                if(!r.error) { this.state.game = r; this.render(); }
            },

            async gameAction(act) {
                if (this.state.isProcessing) return;
                this.state.isProcessing = true;
                const res = await MetroAPI.performAction(this.state.lobbyId, act, this.state.game.turnCount);
                if (res.error) tg.showAlert(res.error);
                else { this.state.game = res; this.state.net.send('UPDATE_SIGNAL'); this.render(); }
                this.state.isProcessing = false;
            },

            render() {
                const g = this.state.game; if(!g) return;
                document.getElementById('game-status').textContent = g.status.replace(/_/g, ' ');
                this.drawCards('host-hand', 'host-score', g.hostHand, g.hostScore);
                this.drawCards('guest-hand', 'guest-score', g.guestHand, g.guestScore);
                const showD = g.status === 'END' || g.status === 'DEALER_TURN';
                this.drawCards('dealer-hand', 'dealer-score', g.dealerHand, g.dealerScore, !showD);
                
                const me = g.myRole;
                const myTurn = (me === 'host' && g.status === 'HOST_TURN') || (me === 'guest' && g.status === 'GUEST_TURN');
                document.getElementById('game-actions').style.opacity = myTurn ? '1' : '0.2';
                
                if (g.status === 'END') {
                    const myS = me === 'host' ? g.hostScore : g.guestScore;
                    const dS = typeof g.dealerScore === 'number' ? g.dealerScore : 0;
                    let res = (myS > 21) ? "BUSTED" : (dS > 21 || myS > dS) ? "WINNER" : (myS === dS) ? "PUSH" : "LOSE";
                    document.getElementById('result-title').textContent = res;
                    document.getElementById('result-title').className = `font-cyber text-4xl mb-8 italic ${res === 'WINNER' ? 'text-emerald-500' : 'text-rose-500'}`;
                    document.getElementById('result-overlay').classList.remove('hidden');
                }
            },

            drawCards(cId, sId, hand, score, hideFirst = false) {
                const slot = document.getElementById(cId);
                const frag = document.createDocumentFragment();
                (hand || []).forEach((c, i) => {
                    const card = document.createElement('div');
                    if(hideFirst && i === 0) card.className = 'card-ui bg-slate-900 border border-white/5';
                    else {
                        const isRed = ['♥', '♦'].includes(c.suit);
                        card.className = `card-ui ${isRed ? 'card-red' : ''}`;
                        card.innerHTML = `<span class="absolute top-1 left-1">${this.esc(c.value)}</span><span class="text-lg">${this.esc(c.suit)}</span>`;
                    }
                    frag.appendChild(card);
                });
                slot.replaceChildren(frag);
                document.getElementById(sId).textContent = hideFirst ? '?' : score;
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
