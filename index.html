
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background-color: #020617; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-ui { width: 60px; height: 85px; background: white; border-radius: 8px; color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-red { color: #ef4444; }
        .btn-action { transition: all 0.2s; border-bottom: 3px solid rgba(0,0,0,0.3); }
        .btn-action:active { transform: translateY(2px); border-bottom-width: 0; }
    </style>
</head>
<body class="h-screen w-full flex flex-col">

    <!-- VIEW: HOME -->
    <div id="view-home" class="view flex-1 flex flex-col p-5">
        <div class="flex items-center gap-4 mb-6 glass p-4 rounded-2xl">
            <div id="user-avatar" class="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-xl font-bold">U</div>
            <div class="flex-1">
                <h2 id="user-name" class="text-white font-bold">Player</h2>
                <div class="text-emerald-400 font-bold"><span id="user-balance">1000</span> CASH</div>
            </div>
            <!-- Кнопка админа убрана по инструкции -->
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="App.setTab('games')" id="tab-btn-games" class="flex-1 py-2 rounded-lg bg-emerald-600 text-white font-bold text-xs uppercase">GAMES</button>
            <button onclick="App.setTab('servers')" id="tab-btn-servers" class="flex-1 py-2 rounded-lg bg-slate-800 text-slate-400 font-bold text-xs uppercase">LOBBIES</button>
        </div>

        <div id="content-games" class="space-y-3">
            <div onclick="App.openCreateLobby('blackjack')" class="p-5 glass rounded-2xl border-l-4 border-emerald-500">
                <h3 class="text-lg font-bold">BJ: UNDERGROUND</h3>
                <p class="text-xs text-slate-500 uppercase tracking-tighter">Min Bet: 100 CASH</p>
            </div>
        </div>

        <div id="content-servers" class="hidden space-y-3 overflow-y-auto">
            <div id="server-list" class="space-y-2"><p class="text-center text-xs text-slate-600 mt-10">No signals...</p></div>
        </div>
    </div>

    <!-- VIEW: GAME TABLE -->
    <div id="view-game" class="view hidden fixed inset-0 z-50 bg-[#064e3b] flex flex-col">
        <div class="p-4 flex justify-between items-center bg-black/20">
            <div class="text-[10px] text-white/50">TABLE ID: <span id="game-table-id"></span></div>
            <div id="game-status" class="text-xs font-bold text-emerald-400 animate-pulse">WAITING...</div>
        </div>

        <!-- Dealer Area -->
        <div class="flex-1 flex flex-col items-center justify-center relative border-b border-white/5">
            <div class="text-[10px] text-white/30 absolute top-4 uppercase tracking-widest">Dealer Hand</div>
            <div id="dealer-cards" class="flex gap-2"></div>
            <div id="dealer-score" class="mt-2 text-white font-bold"></div>
        </div>

        <!-- Player Area -->
        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div class="text-[10px] text-white/30 absolute top-4 uppercase tracking-widest">Your Hand</div>
            <div id="player-cards" class="flex gap-2"></div>
            <div id="player-score" class="mt-2 text-white font-bold"></div>
            
            <div id="game-controls" class="hidden absolute bottom-10 flex gap-4">
                <button onclick="App.gameAction('HIT')" class="btn-action w-24 py-4 bg-emerald-500 rounded-xl font-bold text-white shadow-lg">HIT</button>
                <button onclick="App.gameAction('STAND')" class="btn-action w-24 py-4 bg-slate-700 rounded-xl font-bold text-white shadow-lg">STAND</button>
            </div>
        </div>
        
        <div id="game-overlay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60]">
            <div class="text-center">
                <h1 id="result-text" class="text-4xl font-black mb-6">YOU WIN!</h1>
                <button onclick="location.reload()" class="px-8 py-3 bg-emerald-600 rounded-xl font-bold">BACK TO LOBBY</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { MetroAPI, CHANNEL_ID } from './api.js';
        import { MetroNetwork } from './network.js';
        import { Blackjack } from './game.js';

        const tg = window.Telegram.WebApp;

        window.App = {
            state: {
                user: { id: Date.now(), name: 'Guest', balance: 1000 },
                role: null, // 'dealer' or 'player'
                game: {
                    deck: [],
                    dealerHand: [],
                    playerHand: [],
                    status: 'WAITING',
                    bet: 100
                },
                net: null
            },

            init() {
                tg.ready();
                const u = tg.initDataUnsafe?.user;
                if(u) {
                    this.state.user.id = u.id;
                    this.state.user.name = u.first_name;
                    document.getElementById('user-name').innerText = u.first_name;
                }
                
                this.state.net = new MetroNetwork(this.state.user.id, (data) => this.handleNetMessage(data), (conn) => this.onPlayerJoined());
                setInterval(() => this.refreshLobbies(), 10000);
            },

            setTab(tab) {
                document.getElementById('content-games').classList.toggle('hidden', tab !== 'games');
                document.getElementById('content-servers').classList.toggle('hidden', tab !== 'servers');
                if(tab === 'servers') this.refreshLobbies();
            },

            async openCreateLobby() {
                this.state.role = 'dealer';
                const bet = prompt("Enter Bet Amount:", "100") || "100";
                this.state.game.bet = parseInt(bet);
                
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById('view-game').classList.remove('hidden');
                document.getElementById('game-table-id').innerText = this.state.user.id;
                
                const text = `#METRO_LOBBY|ID:metro_${this.state.user.id}|USER:${this.state.user.name}|BET:${bet}`;
                await MetroAPI.sendMessage(CHANNEL_ID, text);
            },

            async refreshLobbies() {
                const listEl = document.getElementById('server-list');
                const updates = await MetroAPI.getUpdates();
                const lobbies = updates.map(u => MetroAPI.parseLobby((u.channel_post || u.message)?.text, (u.channel_post || u.message)?.date)).filter(x => x);
                
                if(lobbies.length === 0) return;

                listEl.innerHTML = lobbies.map(l => `
                    <div onclick="App.joinLobby('${l.id}', ${l.bet})" class="glass p-4 rounded-xl flex justify-between items-center">
                        <div>
                            <div class="text-white font-bold text-sm">${l.user}'s Table</div>
                            <div class="text-[10px] text-emerald-500">READY TO PLAY</div>
                        </div>
                        <div class="text-right">
                            <div class="text-emerald-400 font-bold">${l.bet} CASH</div>
                        </div>
                    </div>
                `).join('');
            },

            joinLobby(id, bet) {
                this.state.role = 'player';
                this.state.game.bet = bet;
                this.state.net.connectTo(id);
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById('view-game').classList.remove('hidden');
                document.getElementById('game-table-id').innerText = id;
            },

            onPlayerJoined() {
                if(this.state.role !== 'dealer') return;
                this.startNewGame();
            },

            startNewGame() {
                this.state.game.deck = Blackjack.createDeck();
                this.state.game.playerHand = [this.state.game.deck.pop(), this.state.game.deck.pop()];
                this.state.game.dealerHand = [this.state.game.deck.pop(), this.state.game.deck.pop()];
                this.state.game.status = 'PLAYER_TURN';
                this.sync();
            },

            handleNetMessage(msg) {
                switch(msg.type) {
                    case 'SYNC':
                        this.state.game = msg.state;
                        this.renderGame();
                        break;
                    case 'ACTION':
                        if(this.state.role === 'dealer') this.processPlayerAction(msg.action);
                        break;
                }
            },

            processPlayerAction(action) {
                if(action === 'HIT') {
                    this.state.game.playerHand.push(this.state.game.deck.pop());
                    if(Blackjack.getScore(this.state.game.playerHand) > 21) {
                        this.state.game.status = 'FINISHED';
                    }
                } else {
                    this.state.game.status = 'DEALER_TURN';
                    this.dealerPlay();
                }
                this.sync();
            },

            dealerPlay() {
                while(Blackjack.getScore(this.state.game.dealerHand) < 17) {
                    this.state.game.dealerHand.push(this.state.game.deck.pop());
                }
                this.state.game.status = 'FINISHED';
                this.sync();
            },

            sync() {
                this.state.net.send('SYNC', { state: this.state.game });
                this.renderGame();
            },

            gameAction(act) {
                if(this.state.role === 'player') {
                    this.state.net.send('ACTION', { action: act });
                } else {
                    this.processPlayerAction(act);
                }
            },

            renderGame() {
                const g = this.state.game;
                const pList = document.getElementById('player-cards');
                const dList = document.getElementById('dealer-cards');
                
                pList.innerHTML = g.playerHand.map(c => this.renderCard(c)).join('');
                dList.innerHTML = g.dealerHand.map((c, i) => 
                    (i === 0 && g.status === 'PLAYER_TURN' && this.state.role === 'player') 
                    ? `<div class="card-ui bg-slate-800 border-2 border-white/20"></div>` 
                    : this.renderCard(c)
                ).join('');

                document.getElementById('player-score').innerText = Blackjack.getScore(g.playerHand);
                document.getElementById('dealer-score').innerText = g.status === 'FINISHED' ? Blackjack.getScore(g.dealerHand) : '?';
                
                const controls = document.getElementById('game-controls');
                if(g.status === 'PLAYER_TURN') {
                    controls.classList.remove('hidden');
                } else {
                    controls.classList.add('hidden');
                }

                if(g.status === 'FINISHED') {
                    this.showResult();
                }
            },

            renderCard(c) {
                const isRed = ['♥', '♦'].includes(c.suit);
                return `<div class="card-ui ${isRed ? 'card-red' : ''}">
                    <div class="text-xs self-start ml-1">${c.value}</div>
                    <div class="text-2xl">${c.suit}</div>
                    <div class="text-xs self-end mr-1 rotate-180">${c.value}</div>
                </div>`;
            },

            showResult() {
                const pS = Blackjack.getScore(this.state.game.playerHand);
                const dS = Blackjack.getScore(this.state.game.dealerHand);
                let res = "";

                if(pS > 21) res = "BUST! YOU LOSE";
                else if(dS > 21) res = "DEALER BUSTS! WIN";
                else if(pS > dS) res = "YOU WIN!";
                else if(pS < dS) res = "YOU LOSE";
                else res = "PUSH (DRAW)";

                document.getElementById('result-text').innerText = res;
                document.getElementById('game-overlay').classList.remove('hidden');
            }
        };

        App.init();
    </script>
</body>
</html>
