
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH - Underground Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        :root { --neon-green: #10b981; --bg-dark: #020617; }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--bg-dark); color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .server-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); border-left: 4px solid var(--neon-green); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative">

    <!-- MODAL: DEPOSIT -->
    <div id="modal-payment" class="modal hidden">
        <div class="glass w-full max-w-sm p-6 rounded-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-4 uppercase text-emerald-400">Deposit</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase">Amount (CASH)</label>
                    <input id="payment-amount" type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-emerald-500">
                </div>
                <div id="withdraw-fields" class="hidden">
                    <label class="text-[10px] text-slate-500 uppercase">Wallet / Card Details</label>
                    <input id="payment-details" type="text" placeholder="USDT / Card / Crypto" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-emerald-500">
                </div>
                <button onclick="App.submitPaymentRequest()" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl">SEND REQUEST</button>
                <button onclick="App.closeModal()" class="w-full text-slate-500 text-sm">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- VIEW: SPLASH -->
    <div id="view-splash" class="view fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950">
        <div class="w-20 h-20 border-4 border-emerald-500 border-t-transparent animate-spin rounded-full"></div>
        <p class="mt-4 text-emerald-500 uppercase tracking-widest text-[10px] animate-pulse">Connecting to Metro Network...</p>
    </div>

    <!-- VIEW: HOME -->
    <div id="view-home" class="view hidden flex-1 flex flex-col p-5 overflow-y-auto">
        <div class="flex items-center gap-4 mb-8 glass p-4 rounded-2xl">
            <div class="w-14 h-14 rounded-full border-2 border-emerald-500 bg-slate-800 flex items-center justify-center text-xl font-bold text-emerald-500" id="user-avatar-text">?</div>
            <div class="flex-1">
                <h2 id="user-name" class="text-lg font-bold text-white leading-none">User</h2>
                <div class="flex items-center text-emerald-400 font-bold">
                    <span id="user-balance">0.00</span><span class="ml-1 text-[10px] opacity-70">CASH</span>
                </div>
            </div>
            <button onclick="location.href='admin.html'" class="p-2 bg-slate-800 rounded-lg">⚙️</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="App.setHomeTab('games')" id="tab-btn-games" class="flex-1 py-2 rounded-lg bg-emerald-600 text-white font-bold text-sm uppercase">Games</button>
            <button onclick="App.setHomeTab('servers')" id="tab-btn-servers" class="flex-1 py-2 rounded-lg bg-slate-800 text-slate-400 font-bold text-sm uppercase">Servers</button>
        </div>

        <div id="tab-games" class="space-y-4">
            <div onclick="App.openCreateLobby('blackjack')" class="p-4 rounded-xl glass border border-slate-800 hover:border-emerald-500 transition-all cursor-pointer">
                <h3 class="text-xl font-bold text-white">BLACKJACK</h3>
                <p class="text-xs text-slate-400">Host your own table and win.</p>
            </div>
        </div>

        <div id="tab-servers" class="hidden space-y-3">
            <div id="server-list" class="space-y-3">
                <div class="text-center py-10 text-slate-600 text-xs">Scanning for signals...</div>
            </div>
        </div>

        <div class="mt-auto grid grid-cols-2 gap-3 pt-6">
            <button onclick="App.openPaymentModal('DEPOSIT')" class="bg-emerald-600/20 border border-emerald-500 text-emerald-500 font-bold py-3 rounded-xl uppercase">Deposit</button>
            <button onclick="App.openPaymentModal('WITHDRAW')" class="bg-slate-800 border border-slate-700 text-white font-bold py-3 rounded-xl uppercase">Withdraw</button>
        </div>
    </div>

    <!-- LOBBY & GAME VIEWS (Keep structure from previous but simplified for integration) -->
    <div id="view-lobby-config" class="view hidden p-6 text-center">
        <h2 class="text-2xl font-bold mb-6 mt-20">CREATE TABLE</h2>
        <input id="input-bet" type="number" value="100" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-emerald-400 text-2xl text-center mb-6">
        <button onclick="App.createGameAction()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl">PUBLISH TO CHANNEL</button>
        <button onclick="App.switchView('home')" class="mt-4 text-slate-500">BACK</button>
    </div>

    <div id="view-lobby-wait" class="view hidden p-6 text-center">
        <div class="w-20 h-20 border-4 border-emerald-500 border-t-transparent animate-spin rounded-full mx-auto mt-20"></div>
        <h2 class="text-xl font-bold mt-6">LOBBY ACTIVE</h2>
        <p class="text-xs text-slate-500 mt-2">Waiting for opponent from channel...</p>
        <div id="lobby-id-display" class="mt-10 font-mono text-emerald-500 opacity-50"></div>
        <button onclick="App.cancelLobby()" class="mt-10 text-red-500 font-bold">CANCEL</button>
    </div>

    <script type="module">
        import { MetroAPI, CHANNEL_ID } from './api.js';

        const tg = window.Telegram.WebApp;
        
        window.App = {
            state: {
                user: { id: 0, name: 'Guest', balance: 1000 },
                activeTab: 'games',
                lobbyHeartbeat: null,
                paymentMode: 'DEPOSIT',
                peer: null, conn: null, peerId: null
            },

            async init() {
                tg.ready();
                tg.expand();
                const u = tg.initDataUnsafe?.user;
                if(u) {
                    this.state.user.id = u.id;
                    this.state.user.name = u.first_name;
                    document.getElementById('user-name').innerText = u.first_name;
                    document.getElementById('user-avatar-text').innerText = u.first_name[0];
                }
                
                this.initNetwork();
                setTimeout(() => this.switchView('home'), 1000);
                setInterval(() => this.refreshServers(), 10000);
            },

            initNetwork() {
                const id = `metro_${this.state.user.id || Math.floor(Math.random()*1000)}`;
                this.state.peer = new Peer(id);
                this.state.peer.on('open', (pid) => this.state.peerId = pid);
                this.state.peer.on('connection', (conn) => {
                    this.state.conn = conn;
                    this.setupConnection();
                    alert("Player joined! Game starting...");
                });
            },

            setupConnection() {
                this.state.conn.on('open', () => {
                    // Logic to start game
                });
            },

            switchView(id) {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(`view-${id}`).classList.remove('hidden');
            },

            setHomeTab(tab) {
                this.state.activeTab = tab;
                document.getElementById('tab-games').classList.toggle('hidden', tab !== 'games');
                document.getElementById('tab-servers').classList.toggle('hidden', tab !== 'servers');
                if(tab === 'servers') this.refreshServers();
            },

            // --- LOBBY LOGIC ---
            async createGameAction() {
                const bet = document.getElementById('input-bet').value;
                this.switchView('lobby-wait');
                document.getElementById('lobby-id-display').innerText = this.state.peerId;

                // Heartbeat system: репостим лобби каждые 30 сек чтобы оно было в топе
                const publish = async () => {
                    const text = `#METRO_LOBBY|ID:${this.state.peerId}|USER:${this.state.user.name}|BET:${bet}`;
                    await MetroAPI.sendMessage(CHANNEL_ID, text);
                };

                publish();
                this.state.lobbyHeartbeat = setInterval(publish, 45000);
            },

            cancelLobby() {
                if(this.state.lobbyHeartbeat) clearInterval(this.state.lobbyHeartbeat);
                this.switchView('home');
            },

            async refreshServers() {
                if(this.state.activeTab !== 'servers') return;
                const listEl = document.getElementById('server-list');
                const updates = await MetroAPI.getUpdates();
                
                const lobbies = [];
                updates.forEach(u => {
                    const msg = u.channel_post || u.message;
                    if(!msg) return;
                    const data = MetroAPI.parseLobby(msg.text, msg.date);
                    if(data) lobbies.push(data);
                });

                // Unique by ID
                const uniqueLobbies = Array.from(new Map(lobbies.map(l => [l.id, l])).values());

                if(uniqueLobbies.length === 0) {
                    listEl.innerHTML = '<div class="text-center py-10 text-slate-600 text-xs italic">No active lobbies. Create your own!</div>';
                    return;
                }

                listEl.innerHTML = uniqueLobbies.map(l => `
                    <div onclick="App.joinLobby('${l.id}')" class="server-card p-4 rounded-xl flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                        <div>
                            <div class="text-white font-bold text-sm">${l.user}'s Room</div>
                            <div class="text-[10px] text-emerald-500">ONLINE</div>
                        </div>
                        <div class="text-right">
                            <div class="text-emerald-400 font-bold">${l.bet} CASH</div>
                            <div class="text-[10px] text-slate-500 uppercase">Bet</div>
                        </div>
                    </div>
                `).join('');
            },

            joinLobby(targetId) {
                if(targetId === this.state.peerId) return alert("You cannot join your own lobby");
                this.state.conn = this.state.peer.connect(targetId);
                this.setupConnection();
                alert("Connecting to host...");
            },

            // --- PAYMENT LOGIC ---
            openPaymentModal(type) {
                this.state.paymentMode = type;
                document.getElementById('modal-title').innerText = type;
                document.getElementById('withdraw-fields').classList.toggle('hidden', type === 'DEPOSIT');
                document.getElementById('modal-payment').classList.remove('hidden');
            },

            closeModal() {
                document.getElementById('modal-payment').classList.add('hidden');
            },

            async submitPaymentRequest() {
                const amount = document.getElementById('payment-amount').value;
                const details = document.getElementById('payment-details').value;
                
                if(!amount || amount <= 0) return alert("Enter valid amount");

                const text = `#PAY_REQ|TYPE:${this.state.paymentMode}|USER:${this.state.user.name}|ID:${this.state.user.id}|AMT:${amount}|INFO:${details || 'N/A'}`;
                
                tg.showConfirm(`Send ${this.state.paymentMode} request for ${amount} CASH?`, async (ok) => {
                    if(ok) {
                        tg.MainButton.showProgress();
                        const res = await MetroAPI.sendMessage(CHANNEL_ID, text); // Для примера в канал, лучше в личку админу
                        tg.MainButton.hideProgress();
                        if(res) {
                            alert("Request sent! Wait for admin approval.");
                            this.closeModal();
                        }
                    }
                });
            }
        };

        window.addEventListener('load', () => App.init());
    </script>
</body>
</html>
