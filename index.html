
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background: #020617; color: #e2e8f0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card-ui { width: 60px; height: 85px; background: white; border-radius: 8px; color: black; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .card-red { color: #ef4444; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .server-entry { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .server-entry:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .pulse-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        .system-badge { background: linear-gradient(90deg, #059669, #10b981); color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="h-screen w-full flex flex-col">

    <!-- MODAL: PAYMENT -->
    <div id="modal-pay" class="modal hidden">
        <div class="glass w-full max-w-sm p-6 rounded-2xl">
            <h3 id="pay-title" class="text-xl font-bold mb-4 text-emerald-400">DEPOSIT</h3>
            <div class="space-y-4">
                <input id="pay-amount" type="number" placeholder="Amount" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-emerald-500">
                <div id="pay-extra-fields" class="hidden">
                    <input id="pay-details" type="text" placeholder="Wallet/Card details" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white outline-none focus:border-emerald-500">
                </div>
                <button onclick="App.submitPayment()" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl">SUBMIT REQUEST</button>
                <button onclick="document.getElementById('modal-pay').classList.add('hidden')" class="w-full text-slate-500 text-sm">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- VIEW: HOME -->
    <div id="view-home" class="view flex-1 flex flex-col p-5 overflow-y-auto">
        <div class="flex items-center gap-4 mb-6 glass p-4 rounded-2xl">
            <div class="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-xl font-bold border-2 border-emerald-400/30 shadow-lg shadow-emerald-500/20" id="ui-avatar">?</div>
            <div class="flex-1">
                <h2 id="ui-name" class="text-white font-bold tracking-wide">Guest</h2>
                <div class="text-emerald-400 font-bold flex items-center gap-1">
                    <span id="ui-balance">1000</span> 
                    <span class="text-[10px] opacity-60">CASH</span>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="App.setTab('games')" id="tab-btn-games" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-xs tracking-widest transition-all">GAMES</button>
            <button onclick="App.setTab('servers')" id="tab-btn-servers" class="flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-xs tracking-widest transition-all">SERVERS</button>
        </div>

        <div id="pane-games" class="space-y-3">
            <div onclick="App.openCreateLobby()" class="p-6 glass rounded-2xl border-l-4 border-emerald-500 active:scale-95 transition-all cursor-pointer group">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg group-hover:text-emerald-400 transition-colors">BLACKJACK</h3>
                        <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Host your own table</p>
                    </div>
                    <span class="text-2xl opacity-30 group-hover:opacity-100 transition-opacity">♠</span>
                </div>
            </div>
        </div>

        <div id="pane-servers" class="hidden space-y-3">
            <div id="server-list" class="space-y-3">
                <!-- Lobbies injected here -->
            </div>
        </div>

        <div class="mt-auto grid grid-cols-2 gap-3 pt-6">
            <button onclick="App.openPay('DEPOSIT')" class="bg-emerald-600/10 border border-emerald-500/30 text-emerald-500 font-bold py-4 rounded-2xl text-[10px] tracking-widest uppercase hover:bg-emerald-600/20 transition-all">Deposit</button>
            <button onclick="App.openPay('WITHDRAW')" class="bg-slate-800/50 border border-slate-700 text-white font-bold py-4 rounded-2xl text-[10px] tracking-widest uppercase hover:bg-slate-700 transition-all">Withdraw</button>
        </div>
    </div>

    <!-- VIEW: GAME -->
    <div id="view-game" class="view hidden fixed inset-0 z-50 bg-[#064e3b] flex flex-col">
        <div class="p-4 flex justify-between bg-black/40 backdrop-blur-md text-[10px] border-b border-white/5">
            <span id="game-id-label" class="opacity-50">ID: ---</span>
            <div class="flex items-center gap-2">
                <div class="pulse-dot"></div>
                <span id="game-status-label" class="text-emerald-400 font-bold uppercase tracking-widest">Waiting</span>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col items-center justify-center border-b border-white/5 relative">
            <div class="absolute top-4 text-[10px] text-white/20 uppercase tracking-[0.2em]">Dealer</div>
            <div id="dealer-cards" class="flex gap-2"></div>
            <div id="dealer-score" class="mt-4 px-3 py-1 bg-black/20 rounded-full text-white text-xs font-bold"></div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative bg-black/5">
            <div class="absolute top-4 text-[10px] text-white/20 uppercase tracking-[0.2em]">You</div>
            <div id="player-cards" class="flex gap-2"></div>
            <div id="player-score" class="mt-4 px-3 py-1 bg-black/20 rounded-full text-white text-xs font-bold"></div>
            
            <div id="game-actions" class="hidden absolute bottom-10 flex gap-6">
                <button onclick="App.gameHit()" class="w-28 py-4 bg-emerald-500 text-white font-black rounded-2xl shadow-xl shadow-emerald-900/40 active:scale-95 transition-all">HIT</button>
                <button onclick="App.gameStand()" class="w-28 py-4 bg-slate-700 text-white font-black rounded-2xl shadow-xl shadow-black/40 active:scale-95 transition-all">STAND</button>
            </div>
        </div>

        <div id="result-overlay" class="hidden fixed inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center p-10 text-center animate-in fade-in duration-500">
            <h1 id="result-msg" class="text-6xl font-black mb-10 tracking-tighter italic"></h1>
            <button onclick="location.reload()" class="w-full max-w-xs py-4 bg-white text-black font-black rounded-2xl tracking-widest uppercase hover:bg-emerald-400 transition-colors">Back to Metro</button>
        </div>
    </div>

    <script type="module">
        import { MetroAPI, CHANNEL_ID } from './api.js';
        import { MetroNetwork } from './network.js';
        import { Blackjack } from './game.js';

        const tg = window.Telegram.WebApp;

        // Конфигурация базовых серверов (AI Tables)
        const DEFAULT_SERVERS = [
            { id: 'system_low', user: 'STREET GUTTER', bet: 100, isSystem: true },
            { id: 'system_mid', user: 'MID-CITY STATION', bet: 500, isSystem: true },
            { id: 'system_high', user: 'HIGH ROLLER BANK', bet: 1000, isSystem: true }
        ];

        window.App = {
            state: {
                user: { id: 0, name: 'Guest', balance: 1000 },
                role: null, // 'host', 'client', 'ai'
                game: { deck: [], dealerHand: [], playerHand: [], status: 'WAITING', bet: 100 },
                net: null, heartbeat: null, activeTab: 'games'
            },

            init() {
                tg.ready();
                tg.expand();
                const u = tg.initDataUnsafe?.user;
                if(u) {
                    this.state.user = { id: u.id, name: u.first_name, balance: 1000 };
                    document.getElementById('ui-name').innerText = u.first_name;
                    document.getElementById('ui-avatar').innerText = u.first_name[0];
                }
                this.state.net = new MetroNetwork(this.state.user.id, (d) => this.onNetMsg(d), () => this.onPeerJoin());
                
                setInterval(() => {
                    if(this.state.activeTab === 'servers') this.refreshLobbies();
                }, 8000);
            },

            setTab(t) {
                this.state.activeTab = t;
                document.getElementById('pane-games').classList.toggle('hidden', t !== 'games');
                document.getElementById('pane-servers').classList.toggle('hidden', t !== 'servers');
                
                const bGames = document.getElementById('tab-btn-games');
                const bServers = document.getElementById('tab-btn-servers');
                
                if(t === 'games') {
                    bGames.className = "flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-xs tracking-widest transition-all";
                    bServers.className = "flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-xs tracking-widest transition-all";
                } else {
                    bGames.className = "flex-1 py-3 rounded-xl bg-slate-800 text-slate-400 font-bold text-xs tracking-widest transition-all";
                    bServers.className = "flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold text-xs tracking-widest transition-all";
                    this.refreshLobbies();
                }
            },

            async refreshLobbies() {
                const list = document.getElementById('server-list');
                const updates = await MetroAPI.getUpdates();
                
                const dynamicLobbies = new Map();
                updates.forEach(u => {
                    const msg = u.channel_post || u.message;
                    if(!msg) return;
                    const lobby = MetroAPI.parseLobby(msg.text, msg.date);
                    if(lobby && lobby.id !== `metro_${this.state.user.id}`) {
                        const existing = dynamicLobbies.get(lobby.id);
                        if(!existing || lobby.timestamp > existing.timestamp) dynamicLobbies.set(lobby.id, lobby);
                    }
                });

                // Объединяем системные и динамические
                const allLobbies = [...DEFAULT_SERVERS, ...Array.from(dynamicLobbies.values())];
                
                list.innerHTML = allLobbies.map(i => `
                    <div onclick="App.joinTable('${i.id}', ${i.bet}, ${!!i.isSystem})" class="server-entry glass p-5 rounded-2xl flex justify-between items-center border border-transparent active:scale-95 cursor-pointer">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-emerald-500 font-bold border border-emerald-500/20">
                                ${i.isSystem ? 'M' : i.user[0].toUpperCase()}
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="font-bold text-white tracking-tight">${i.user}</span>
                                    ${i.isSystem ? '<span class="system-badge">OFFICIAL</span>' : ''}
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <div class="pulse-dot"></div>
                                    <span class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">Available</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-emerald-400 font-black text-lg">${i.bet}</div>
                            <div class="text-[9px] text-slate-500 font-bold uppercase">Min Bet</div>
                        </div>
                    </div>
                `).join('');
            },

            joinTable(id, bet, isSystem = false) {
                tg.HapticFeedback.impactOccurred('medium');
                this.state.game.bet = bet;
                this.showView('game');
                
                if(isSystem) {
                    this.state.role = 'ai';
                    document.getElementById('game-id-label').innerText = `SYSTEM_STATION: ${id.toUpperCase()}`;
                    this.startRound(); // Для AI начинаем сразу
                } else {
                    this.state.role = 'client';
                    this.state.net.connectTo(id);
                    document.getElementById('game-id-label').innerText = `CONNECTING: ${id}`;
                }
            },

            async openCreateLobby() {
                const bet = prompt("ENTER YOUR BET (CASH):", "100");
                if(!bet || isNaN(bet) || bet <= 0) return;
                this.state.role = 'host';
                this.state.game.bet = parseInt(bet);
                this.showView('game');
                document.getElementById('game-id-label').innerText = `ID: metro_${this.state.user.id}`;
                const publish = () => MetroAPI.sendMessage(CHANNEL_ID, `#METRO_LOBBY|ID:metro_${this.state.user.id}|USER:${this.state.user.name}|BET:${this.state.game.bet}`);
                publish();
                if(this.state.heartbeat) clearInterval(this.state.heartbeat);
                this.state.heartbeat = setInterval(publish, 45000);
            },

            onPeerJoin() {
                if(this.state.role === 'host') {
                    tg.HapticFeedback.notificationOccurred('success');
                    this.startRound();
                }
            },

            startRound() {
                const deck = Blackjack.createDeck();
                this.state.game = {
                    ...this.state.game,
                    deck: deck,
                    playerHand: [deck.pop(), deck.pop()],
                    dealerHand: [deck.pop(), deck.pop()],
                    status: 'PLAYER_TURN'
                };
                if(this.state.role !== 'ai') this.sync();
                else this.render();
            },

            onNetMsg(msg) {
                if(msg.type === 'SYNC') { this.state.game = msg.game; this.render(); }
                if(msg.type === 'ACTION' && this.state.role === 'host') this.handleAction(msg.act);
            },

            handleAction(act) {
                if(act === 'HIT') {
                    this.state.game.playerHand.push(this.state.game.deck.pop());
                    if(Blackjack.getScore(this.state.game.playerHand) > 21) this.state.game.status = 'END';
                } else {
                    this.state.game.status = 'DEALER_TURN';
                    while(Blackjack.getScore(this.state.game.dealerHand) < 17) this.state.game.dealerHand.push(this.state.game.deck.pop());
                    this.state.game.status = 'END';
                }
                
                if(this.state.role !== 'ai') this.sync();
                else this.render();
            },

            sync() { this.state.net.send('SYNC', { game: this.state.game }); this.render(); },

            gameHit() { 
                tg.HapticFeedback.impactOccurred('light');
                if(this.state.role === 'client') this.state.net.send('ACTION', { act: 'HIT' }); 
                else this.handleAction('HIT');
            },

            gameStand() { 
                tg.HapticFeedback.impactOccurred('light');
                if(this.state.role === 'client') this.state.net.send('ACTION', { act: 'STAND' }); 
                else this.handleAction('STAND');
            },

            render() {
                const g = this.state.game;
                const hideDealer = g.status === 'PLAYER_TURN' && (this.state.role === 'client' || this.state.role === 'ai');
                
                document.getElementById('player-cards').innerHTML = g.playerHand.map(c => this.cardTpl(c)).join('');
                document.getElementById('dealer-cards').innerHTML = g.dealerHand.map((c, i) => 
                    (i === 0 && hideDealer) ? `<div class="card-ui bg-slate-800 border-2 border-white/10"></div>` : this.cardTpl(c)
                ).join('');
                
                document.getElementById('player-score').innerText = Blackjack.getScore(g.playerHand);
                document.getElementById('dealer-score').innerText = hideDealer ? '?' : Blackjack.getScore(g.dealerHand);
                document.getElementById('game-actions').classList.toggle('hidden', g.status !== 'PLAYER_TURN');
                document.getElementById('game-status-label').innerText = g.status.replace('_', ' ');

                if(g.status === 'END') setTimeout(() => this.showResult(), 800);
            },

            cardTpl(c) {
                const isRed = ['♥', '♦'].includes(c.suit);
                return `<div class="card-ui ${isRed ? 'card-red' : ''}"><span class="text-[10px] self-start ml-1 mt-1">${c.value}</span><span class="text-2xl my-auto">${c.suit}</span></div>`;
            },

            showResult() {
                const p = Blackjack.getScore(this.state.game.playerHand);
                const d = Blackjack.getScore(this.state.game.dealerHand);
                let m = ""; let color = "text-white";
                if(p > 21) { m = "BUSTED"; color = "text-red-500"; }
                else if(d > 21 || p > d) { m = "YOU WIN"; color = "text-emerald-400"; tg.HapticFeedback.notificationOccurred('success'); }
                else if(p === d) { m = "PUSH"; color = "text-slate-400"; }
                else { m = "DEALER WINS"; color = "text-red-400"; }
                document.getElementById('result-msg').innerText = m;
                document.getElementById('result-msg').className = `text-6xl font-black mb-10 tracking-tighter italic ${color}`;
                document.getElementById('result-overlay').classList.remove('hidden');
            },

            showView(v) {
                document.querySelectorAll('.view').forEach(el => el.classList.add('hidden'));
                document.getElementById(`view-${v}`).classList.remove('hidden');
            },

            openPay(t) {
                document.getElementById('pay-title').innerText = t;
                document.getElementById('pay-extra-fields').classList.toggle('hidden', t === 'DEPOSIT');
                document.getElementById('modal-pay').classList.remove('hidden');
            },

            async submitPayment() {
                const amt = document.getElementById('pay-amount').value;
                const info = document.getElementById('pay-details').value;
                const text = `#PAY_REQ|TYPE:${document.getElementById('pay-title').innerText}|USER:${this.state.user.name}|ID:${this.state.user.id}|AMT:${amt}|INFO:${info || 'N/A'}`;
                tg.MainButton.showProgress();
                await MetroAPI.sendMessage(CHANNEL_ID, text);
                tg.MainButton.hideProgress();
                alert("Request sent!");
                document.getElementById('modal-pay').classList.add('hidden');
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
